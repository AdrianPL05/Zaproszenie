<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zaproszenie</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    text-align:center;
    color:white;
    background:black;
    overflow:hidden;
    position:relative;
    min-height:100vh;
}

video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:contain;
    z-index:-2;
    background:black;
}

.content{
    position:relative;
    top:20vh;
    background:rgba(0,0,0,0.5);
    padding:40px;
    border-radius:20px;
    width:60%;
    margin:auto;
    z-index:2;
}

.foto{
    position:absolute;
    width:120px;
    height:160px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.5);
    z-index:1;
    border:2px solid white;
}

/* porozrzucane zdjęcia */
.f1{ top:8%; left:5%; transform:rotate(-12deg); }
.f2{ top:15%; right:6%; transform:rotate(10deg); }
.f3{ bottom:12%; left:8%; transform:rotate(8deg); }
.f4{ bottom:10%; right:7%; transform:rotate(-10deg); }
.f5{ top:45%; left:2%; transform:rotate(-6deg); }
.f6{ top:50%; right:2%; transform:rotate(7deg); }

@media (max-width: 768px){
    .content{
        width:80%;
        top:18vh;
        padding:25px;
    }

    .foto{
        width:80px;
        height:110px;
    }
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
    <source src="taniec.mp4" type="video/mp4">
</video>

<!-- małe porozrzucane zdjęcia -->
<img src="zdjecie1.jpg" alt="" class="foto f1">
<img src="zdjecie2.jpg" alt="" class="foto f2">
<img src="zdjecie3.jpg" alt="" class="foto f3">
<img src="zdjecie4.jpg" alt="" class="foto f4">
<img src="zdjecie5.jpg" alt="" class="foto f5">
<img src="zdjecie6.jpg" alt="" class="foto f6">

<div class="content">
    <h1>Hej 😊</h1>
    <p>Mam pytanie:</p>
    <h2>Czy pójdziesz ze mną na spacer?</h2>
    <p>Obiecuję, że nie będę aż tak tańczył 😅</p>
</div>

</body>
</html>
