<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zaproszenie</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    text-align:center;
    color:white;
    background:black;
    overflow-x:hidden;
}

video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:contain;
    z-index:-1;
    background:black;
}

.content{
    position:relative;
    top:10vh;
    background:rgba(0,0,0,0.5);
    padding:40px;
    border-radius:20px;
    width:70%;
    margin:auto;
}

.gallery{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    margin-top:25px;
}

.photo{
    width:220px;
    max-width:90%;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
    <source src="taniec.mp4" type="video/mp4">
</video>

<div class="content">
    <h1>Hej 😊</h1>
    <p>Mam pytanie:</p>
    <h2>Czy pójdziesz ze mną na spacer?</h2>
    <p>Obiecuję że nie będę aż tak tańczył 😅</p>

    <div class="gallery">
        <img src="zdjecie1.jpg" alt="Zdjęcie 1" class="photo">
        <img src="zdjecie2.jpg" alt="Zdjęcie 2" class="photo">
        <img src="zdjecie3.jpg" alt="Zdjęcie 3" class="photo">
    </div>
</div>

</body>
</html>
